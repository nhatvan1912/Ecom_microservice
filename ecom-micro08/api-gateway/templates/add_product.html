{% extends "base.html" %}
{% block title %}Thêm sản phẩm mới{% endblock %}
{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3">
        <h1 class="h4 mb-0"><i class="bi bi-journal-plus me-2"></i>Thêm sản phẩm mới</h1>
    </div>
    <div class="card-body p-4">
        <form action="/products/add" method="post" class="row g-3">
            <div class="col-12">
                <label for="title" class="form-label">Tiêu đề</label>
                <input class="form-control" type="text" name="title" required>
            </div>
            <div class="col-12">
                <label for="brand" class="form-label">Thương hiệu</label>
                <input class="form-control" type="text" name="brand" required>
            </div>
            <div class="col-md-6">
                <label for="category" class="form-label">Danh mục</label>
                <select name="category_id" class="form-select">
                    <option value="">Không có danh mục</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label for="price" class="form-label">Giá (VND)</label>
                <input class="form-control" type="number" name="price" min="1" required>
            </div>
            <div class="col-12">
                <label for="image_url" class="form-label">Ảnh sản phẩm (URL)</label>
                <input class="form-control" type="url" name="image_url" placeholder="https://example.com/product-cover.jpg">
                <div class="form-text">Để trống nếu chưa có ảnh.</div>
            </div>
            <div class="col-md-6">
                <label for="stock" class="form-label">Tồn kho</label>
                <input class="form-control" type="number" name="stock" min="0" required>
            </div>
            <div class="col-12 d-flex gap-2 mt-4">
                <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg me-2"></i>Lưu</button>
                <a class="btn btn-outline-secondary" href="/products">Hủy</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
