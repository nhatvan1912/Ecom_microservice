{% extends "base.html" %}
{% block title %}Chatbot tư vấn sản phẩm{% endblock %}
{% block content %}
<section class="card shadow-sm border-0 mb-4 customer-surface">
    <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <div>
                <h1 class="h4 mb-1">Chatbot tư vấn sản phẩm</h1>
                <p class="text-muted mb-0">Hỏi về sản phẩm, giá, thể loại hoặc nhờ gợi ý theo nhu cầu.</p>
            </div>
            <button id="btn-new-session" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-clockwise me-1"></i>Phiên mới
            </button>
        </div>

        <div id="chat-log" class="border rounded p-3 mb-3" style="height: 420px; overflow-y: auto; background: #fff;"></div>

        <form id="chat-form" class="d-flex gap-2">
            <input id="chat-input" class="form-control" type="text" placeholder="Ví dụ: Gợi ý 3 sản phẩm công nghệ dưới 200k" required>
            <button class="btn btn-primary" type="submit">
                <i class="bi bi-send"></i>
            </button>
        </form>
    </div>
</section>

<style>
    .chat-message-row {
        display: flex;
        margin-bottom: 12px;
    }

    .chat-message-row.user {
        justify-content: flex-end;
    }

    .chat-message-row.assistant {
        justify-content: flex-start;
        align-items: flex-start;
        gap: 10px;
    }

    .chatbot-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #0ea5e9;
        color: #fff;
        flex-shrink: 0;
        margin-top: 2px;
    }
</style>

<script>
(() => {
    const STORAGE_KEY = 'chatbot_session_id';
    let sessionId = localStorage.getItem(STORAGE_KEY);
    const logEl = document.getElementById('chat-log');
    const formEl = document.getElementById('chat-form');
    const inputEl = document.getElementById('chat-input');
    const newBtn = document.getElementById('btn-new-session');

    function escapeHtml(str) {
        return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function linkifyText(str) {
        const escaped = escapeHtml(str);
        const withHttpLinks = escaped.replace(
            /(https?:\/\/[^\s<]+)/g,
            '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
        );
        return withHttpLinks.replace(
            /(^|\s)(\/products\/\d+)/g,
            '$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>'
        );
    }

    function addMessage(role, content, citations = [], options = {}) {
        const wrapper = document.createElement('div');
        wrapper.className = role === 'user' ? 'chat-message-row user' : 'chat-message-row assistant';
        if (options.messageId) wrapper.dataset.messageId = options.messageId;

        let contentWrap = wrapper;

        if (role !== 'user') {
            const avatar = document.createElement('span');
            avatar.className = 'chatbot-avatar';
            avatar.setAttribute('aria-label', 'Robot');
            avatar.innerHTML = '<i class="bi bi-robot"></i>';
            wrapper.appendChild(avatar);

            contentWrap = document.createElement('div');
            contentWrap.className = 'd-flex flex-column';
            wrapper.appendChild(contentWrap);
        }

        const bubble = document.createElement('div');
        bubble.className = role === 'user' ? 'd-inline-block px-3 py-2 rounded-3 text-white bg-primary' : 'd-inline-block px-3 py-2 rounded-3 bg-light';
        bubble.style.maxWidth = '88%';
        bubble.innerHTML = `<div style="white-space: pre-wrap">${linkifyText(content)}</div>`;

        contentWrap.appendChild(bubble);

        if (role !== 'user' && citations.length) {
            const refs = document.createElement('div');
            refs.className = 'small text-muted mt-1';
            refs.innerHTML = citations.map(c => {
                const title = escapeHtml(c.title);
                const score = Number(c.score || 0).toFixed(4);
                const detailUrl = c.detail_url || (c.metadata && c.metadata.detail_url);
                if (detailUrl) {
                    return `• <a href="${escapeHtml(detailUrl)}" target="_blank" rel="noopener noreferrer">${title}</a> (score=${score})`;
                }
                return `• ${title} (score=${score})`;
            }).join('<br>');
            contentWrap.appendChild(refs);
        }

        logEl.appendChild(wrapper);
        logEl.scrollTop = logEl.scrollHeight;
        return wrapper;
    }

    async function loadHistory() {
        if (!sessionId) return;
        const res = await fetch(`/api/chatbot/history?session_id=${encodeURIComponent(sessionId)}`);
        if (!res.ok) return;
        const data = await res.json();
        logEl.innerHTML = '';
        (data || []).forEach(msg => addMessage(msg.role, msg.content, msg.citations || []));
    }

    function setSessionId(value) {
        sessionId = value || null;
        if (sessionId) {
            localStorage.setItem(STORAGE_KEY, sessionId);
        } else {
            localStorage.removeItem(STORAGE_KEY);
        }
    }

    function showThinking() {
        return addMessage('assistant', 'Bot đang suy nghĩ...');
    }

    function removeThinking(el) {
        if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    formEl.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = inputEl.value.trim();
        if (!message) return;

        addMessage('user', message);
        inputEl.value = '';

        const body = { message, top_k: 5 };
        if (sessionId) body.session_id = sessionId;

        const thinkingEl = showThinking();

        try {
            const res = await fetch('/api/chatbot/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!res.ok) {
                addMessage('assistant', 'Xin lỗi, chatbot đang bận. Bạn thử lại sau nhé.');
                return;
            }

            const data = await res.json();
            setSessionId(data.session_id);
            addMessage('assistant', data.answer, data.citations || []);
        } catch (e) {
            addMessage('assistant', 'Xin lỗi, chatbot đang bận. Bạn thử lại sau nhé.');
        } finally {
            removeThinking(thinkingEl);
        }
    });

    newBtn.addEventListener('click', async () => {
        if (sessionId) {
            try {
                await fetch(`/api/chatbot/history?session_id=${encodeURIComponent(sessionId)}`, { method: 'DELETE' });
            } catch (e) {
                // Keep UI responsive even if backend cleanup fails.
            }
        }
        setSessionId(null);
        logEl.innerHTML = '';
        addMessage('assistant', 'Xin chào! Mình có thể giúp bạn tìm sản phẩm theo thể loại, thương hiệu hoặc mức giá.');
    });

    if (sessionId) {
        loadHistory();
    } else {
        addMessage('assistant', 'Xin chào! Mình có thể giúp bạn tìm sản phẩm theo thể loại, thương hiệu hoặc mức giá.');
    }
})();
</script>
{% endblock %}
